version: "1.4"

project:
  name: trendly
  description: >
    MCP-compatible content pipeline for AI-assisted Danish affiliate article generation,
    validation, and publishing to WordPress.

tech_stack:
  runtime: Node.js 20+
  language: TypeScript 5
  framework: Fastify 5
  mcp_sdk: "@modelcontextprotocol/sdk (Streamable HTTP)"
  validation: Zod 4
  markdown: marked
  http_client: Axios 1
  job_store: In-memory Map
  database: None (local JSON files for registry and product cache)

domains:
  - name: api
    spec: openspec/specs/api/spec.md
  - name: brief
    spec: openspec/specs/brief/spec.md
  - name: compliance
    spec: openspec/specs/compliance/spec.md
  - name: widgets
    spec: openspec/specs/widgets/spec.md
  - name: publisher
    spec: openspec/specs/publisher/spec.md

phase:
  current: 2
  notes: >
    All core pipeline features are shipped and running.
    Live PriceRunner v4 API integration is active (with 24h cache and rate limiting).
    WordPress publishing is live via REST API + RankMath SEO meta.
    MCP server exposes get_brief, validate_article, and publish_article tools on port 3001.
    Content registry tracks published product IDs per site to prevent duplicate coverage.
    Local product store (data/products.json) remains available as a fallback.

sites:
  techblog:
    tone: analytical
    min_words: 800
    max_words: 1400
    wp_base_url: https://techblog.example.dk
  budgetshop:
    tone: friendly
    min_words: 500
    max_words: 900
    wp_base_url: https://budgetshop.example.dk
