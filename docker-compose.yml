services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: affiliate_pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d affiliate_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://pipeline:pipeline_secret@db:5432/affiliate_pipeline
      API_KEY: changeme
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
